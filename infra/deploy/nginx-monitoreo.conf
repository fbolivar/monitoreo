# HTTP -> redirige a HTTPS
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}
# HTTPS
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/ssl/monitoreo/cert.pem;
    ssl_certificate_key /etc/ssl/monitoreo/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # IP real del cliente detrás del gateway/FortiGate (192.168.50.1).
    # Si el FortiGate reenvía X-Forwarded-For, nginx fija $remote_addr a la IP real.
    set_real_ip_from 192.168.50.1;
    set_real_ip_from 127.0.0.1;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    root /opt/monitoreo/frontend/dist/frontend/browser;
    index index.html;
    client_max_body_size 10m;

    location ~ ^/(api|up)(/|$) {
        root /opt/monitoreo/api/public;
        try_files $uri @laravel;
    }
    location @laravel {
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /opt/monitoreo/api/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param HTTPS on;
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}
